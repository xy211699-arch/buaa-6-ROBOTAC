seed: 42
num_steps_per_env: 32
max_iterations: 50001
obs_groups:
  actor: !!python/tuple
  - actor
  critic: !!python/tuple
  - critic
save_interval: 100
experiment_name: g1_boxing_velocity
run_name: ''
logger: wandb
wandb_project: mjlab
wandb_tags: !!python/tuple []
resume: false
load_run: .*
load_checkpoint: model_.*.pt
clip_actions: null
upload_model: true
class_name: OnPolicyRunner
actor:
  hidden_dims: !!python/tuple
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
  distribution_cfg:
    init_std: 0.7
    std_type: scalar
critic:
  hidden_dims: !!python/tuple
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: true
algorithm:
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.0005
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.005
  desired_kl: 0.008
  max_grad_norm: 0.7
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  optimizer: adam
  rnd_cfg: null
  symmetry_cfg: null
multi_gpu: null
